name = "basicproxy"
main = "index.js"
compatibility_date = "2025-03-04"

# Fuck off Cloudflare
workers_dev = false
send_metrics = false

# Force enable keeping logs
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

